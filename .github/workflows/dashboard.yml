name: Render family dashboard

on:
  schedule:
    # Runs every 30 minutes. GitHub may delay this by a few minutes under load.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}  # lets you trigger a manual run from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --quiet requests Pillow google-api-python-client google-auth

      - name: Render dashboard image
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          DASHBOARD_SHEET_ID: ${{ secrets.DASHBOARD_SHEET_ID }}
        run: |
          mkdir -p public
          python render_dashboard.py
          cp dashboard.png public/dashboard.png
          cp dashboard_dithered.png public/dashboard_dithered.png

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
